name: vault
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  open_filex: ^4.4.0
  intl: ^0.19.0
  path: ^1.9.0
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

